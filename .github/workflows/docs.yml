name: DBT Docs

on:
  push:
    branches: [main]        # regenerate on every push
  workflow_dispatch:        # manual trigger

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Create profiles.yml
        run: |
          echo "f1_data:" > f1_data/profiles.yml
          echo "  target: prod" >> f1_data/profiles.yml
          echo "  outputs:" >> f1_data/profiles.yml
          echo "    prod:" >> f1_data/profiles.yml
          echo "      type: postgres" >> f1_data/profiles.yml
          echo "      host: \"{{ env_var('SUPABASE_HOST') }}\"" >> f1_data/profiles.yml
          echo "      user: \"{{ env_var('SUPABASE_USER') }}\"" >> f1_data/profiles.yml
          echo "      password: \"{{ env_var('SUPABASE_PASSWORD') }}\"" >> f1_data/profiles.yml
          echo "      port: \"{{ env_var('SUPABASE_PORT') | int }}\"" >> f1_data/profiles.yml
          echo "      dbname: \"{{ env_var('SUPABASE_DBNAME') }}\"" >> f1_data/profiles.yml
          echo "      schema: raw" >> f1_data/profiles.yml
          echo "      threads: 4" >> f1_data/profiles.yml

      - name: Install dbt dependencies
        working-directory: f1_data
        run: dbt deps --profiles-dir .

      - name: Generate dbt docs
        working-directory: f1_data
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_DBNAME: ${{ secrets.SUPABASE_DBNAME }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
        run: dbt docs generate --profiles-dir .

      - name: Move docs to gh-pages folder
        run: |
          mkdir -p gh-pages
          cp f1_data/target/index.html gh-pages/
          cp f1_data/target/manifest.json gh-pages/
          cp f1_data/target/catalog.json gh-pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
